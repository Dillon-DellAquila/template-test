name: External Issue Form
description: Please fill out this form to file an issue that was raised by an **external** staekholder.
assignees: 
  - Dillon-DellAquila
body:
  - type: dropdown
    id: priority
    attributes:
      label: Select the priority of this issue
      multiple: false
      options:
      - Urgent (Needs to be done today)
      - High (Within the next couple days)
      - Medium (Withing the week)
      - Low (within the month)
      - Backlog (no set duedate, use to keep track of ongoing tasks)
    validation:
      required: true
  - type: dropdown
    id: workstream_to
    attributes:
      label: Workstream
      description: Please select the team that will be working on this issue
      multiple: true
      options:
        - Business Insights
        - Capital Management
        - Claims
        - Ember
        - Expense Management
        - FP&A
        - Investor Relations
        - Product
        - Production
        - Sigma
    validation:
      required: true
  - type: dropdown
    id: workstream_from
    attributes:
      label: Workstream
      description: Please select which workstream is requesting this issue
      multiple: true
      options:
        - Agency
        - Claims
        - Data
        - Ember
        - Excecutive
        - Investor Relations
        - Legal
        - Marketing
        - People Team
        - Production
        - Other
    validations:
      required: true
  - type: input
    id: workstream_other
    attributes:
      label: If selected Other, please add the type of issue
      description: _(Optional)_
  - type: dropdown
    id: type
    attributes:
      label: Type of Issue
      multiple: false
      options:
        - Bug Fix
        - Improvement
        - Recurring Reporting
        - Request
        - Other
    validations:
      required: true
  - type: input
    id: type_other
    attributes:
      label: If selected Other, please add the type of issue
      description: _(Optional)_
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Please add a brief description of the work that needs to be done
    validations:
      required: true
  - type: markdown
    attributes:
      value: >
        <br />
  - type: markdown
    attributes:
      value: >
        **Please assign this issue to yourself or someone who will be working on the issue❗❗❗**
